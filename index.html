
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Orçamento Art Look</title>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#f2f2f2;
}

.box {
  position: relative;
  background: #ffffff;
  padding: 15px;
  border-radius: 10px;
  max-width: 600px;
  margin: auto;
  overflow: hidden;
}

.marca {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 250px;
  transform: translate(-50%, -50%);
  opacity: 0.07;
  z-index: 0;
}

.conteudo {
  position: relative;
  z-index: 1;
}

input, textarea {
  width:100%;
  margin:5px 0;
  padding:8px;
}

button {
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.btn-gerar { background:#007bff; color:#fff; }
.btn-copiar { background:#28a745; color:#fff; }
.btn-whats { background:#25D366; color:#fff; }
.btn-reset { background:#dc3545; color:#fff; }

pre {
  background:#000;
  color:#0f0;
  padding:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="marca">

<div class="conteudo">

<h2>📄 Orçamento - Art Look Reformas</h2>

<h3>👤 Cliente</h3>
<input id="nome" placeholder="Nome do cliente">
<input id="telefone" placeholder="Telefone com DDD">
<input id="endereco" placeholder="Endereço">

<h3>🔧 Serviço</h3>
<textarea id="servico" placeholder="Descrição do serviço"></textarea>

<input id="valor" type="number" placeholder="Valor total">
<input id="sinal" type="number" placeholder="Valor do sinal (entrada)">

<button class="btn-gerar" onclick="gerar()">Gerar</button>
<button class="btn-copiar" onclick="copiar()">Copiar</button>
<button class="btn-whats" onclick="enviarWhats()">Enviar WhatsApp</button>
<button class="btn-reset" onclick="resetar()">Resetar Cupons</button>

<h3>Resultado:</h3>
<pre id="resultado"></pre>

</div>
</div>

<script>

// EMPRESA
const empresa = {
  nome: "ART LOOK REFORMAS",
  telefone: "31971930843",
  pix: "SUA CHAVE PIX AQUI"
};

// CONTADOR SALVO
let contador = localStorage.getItem("contadorCupons");
if (!contador) {
  contador = 1;
} else {
  contador = parseInt(contador);
}

let textoFinal = "";

function gerar() {

  let nome = document.getElementById("nome").value;
  let telefone = document.getElementById("telefone").value;
  let endereco = document.getElementById("endereco").value;
  let servico = document.getElementById("servico").value;

  let valor = parseFloat(document.getElementById("valor").value) || 0;
  let sinal = parseFloat(document.getElementById("sinal").value) || 0;

  let restante = valor - sinal;

  let cupons = 0;
  if (valor >= 200) {
    cupons = Math.floor(valor / 200);
  }

  let numeros = [];
  for (let i = 0; i < cupons; i++) {
    numeros.push(contador++);
  }

  // SALVA CONTADOR
  localStorage.setItem("contadorCupons", contador);

  let inicio = numeros.length > 0 ? numeros[0] : 0;
  let fim = numeros.length > 0 ? numeros[numeros.length - 1] : 0;

  textoFinal = `
🏢 *${empresa.nome}*

━━━━━━━━━━━━━━━━━━━

👤 *Cliente:* ${nome}
📞 *Telefone:* ${telefone}
📍 *Endereço:* ${endereco}

━━━━━━━━━━━━━━━━━━━

🔧 *Serviço:*
${servico}

━━━━━━━━━━━━━━━━━━━

💰 *VALOR TOTAL:* R$ ${valor}

📌 *Condição de Pagamento:*
➡️ Sinal (entrada): R$ ${sinal}
➡️ Restante na entrega: R$ ${restante}

━━━━━━━━━━━━━━━━━━━

🎁 *PROMOÇÃO*

💰 Base: R$200 = 1 cupom

🎟 Você recebeu *${cupons} cupons*

🔢 *Seus números:*
${numeros.join(", ")}

📊 *Você está participando com os números ${inicio} até ${fim}*

📊 Sorteio a cada 60 cupons
🏆 Ganhe até 3 diárias grátis

━━━━━━━━━━━━━━━━━━━

💳 *Pagamento via Pix:*
${empresa.pix}

📲 *Contato:* ${empresa.telefone}

━━━━━━━━━━━━━━━━━━━

✔ Serviço com garantia
✔ Qualidade e organização
✔ Compromisso com prazo
`;

  document.getElementById("resultado").innerText = textoFinal;
}

// COPIAR
function copiar() {
  navigator.clipboard.writeText(textoFinal);
  alert("Copiado!");
}

// WHATSAPP
function enviarWhats() {
  let telefone = document.getElementById("telefone").value;
  let msg = encodeURIComponent(textoFinal);
  window.open(`https://wa.me/55${telefone}?text=${msg}`, '_blank');
}

// RESETAR CUPONS
function resetar() {
  localStorage.setItem("contadorCupons", 1);
  alert("Cupons reiniciados!");
}

</script>

</body>
</html>
