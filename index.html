<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Orçamento Art Look</title>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#f2f2f2;
}

.box {
  position: relative;
  background: #ffffff;
  padding: 15px;
  border-radius: 10px;
  max-width: 600px;
  margin: auto;
  overflow: hidden;
}

.marca {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 250px;
  transform: translate(-50%, -50%);
  opacity: 0.07;
  z-index: 0;
}

.conteudo {
  position: relative;
  z-index: 1;
}

input, textarea {
  width:100%;
  margin:5px 0;
  padding:8px;
}

button {
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.btn-gerar { background:#007bff; color:#fff; }
.btn-copiar { background:#28a745; color:#fff; }
.btn-whats { background:#25D366; color:#fff; }
.btn-reset { background:#dc3545; color:#fff; }
.btn-pdf { background:#6f42c1; color:#fff; }

pre {
  background:#000;
  color:#0f0;
  padding:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="marca">

<div class="conteudo">

<h2>📄 Orçamento - Art Look Reformas</h2>

<h3>👤 Cliente</h3>
<input id="nome" placeholder="Nome do cliente">
<input id="telefone" placeholder="Telefone com DDD">
<input id="endereco" placeholder="Endereço">

<h3>🔧 Serviço</h3>
<textarea id="servico" placeholder="Descrição do serviço"></textarea>

<input id="valor" type="number" placeholder="Valor total">
<input id="sinal" type="number" placeholder="Valor do sinal (entrada)">

<button class="btn-gerar" onclick="gerar()">Gerar</button>
<button class="btn-copiar" onclick="copiar()">Copiar</button>
<button class="btn-whats" onclick="enviarWhats()">Enviar WhatsApp</button>
<button class="btn-pdf" onclick="gerarPDFWhats()">PDF + WhatsApp</button>
<button class="btn-reset" onclick="resetar()">Resetar Cupons</button>

<h3>Resultado:</h3>
<pre id="resultado"></pre>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// EMPRESA
const empresa = {
  nome: "ART LOOK REFORMAS",
  telefone: "31971930843",
  pix: "SUA CHAVE PIX AQUI"
};

// CONTADOR
let contador = localStorage.getItem("contadorCupons");
contador = contador ? parseInt(contador) : 1;

let textoFinal = "";

function gerar() {

  let nome = document.getElementById("nome").value;
  let telefone = document.getElementById("telefone").value;
  let endereco = document.getElementById("endereco").value;
  let servico = document.getElementById("servico").value;

  let valor = parseFloat(document.getElementById("valor").value) || 0;
  let sinal = parseFloat(document.getElementById("sinal").value) || 0;

  let restante = valor - sinal;

  let cupons = valor >= 200 ? Math.floor(valor / 200) : 0;

  let numeros = [];
  for (let i = 0; i < cupons; i++) {
    numeros.push(contador++);
  }

  localStorage.setItem("contadorCupons", contador);

  let inicio = numeros[0] || 0;
  let fim = numeros[numeros.length - 1] || 0;

  textoFinal = `
🏢 *${empresa.nome}*

━━━━━━━━━━━━━━━━━━━

👤 *Cliente:* ${nome}
📞 *Telefone:* ${telefone}
📍 *Endereço:* ${endereco}

━━━━━━━━━━━━━━━━━━━

🔧 *Serviço:*
${servico}

━━━━━━━━━━━━━━━━━━━

💰 *VALOR TOTAL:* R$ ${valor}

📌 *Condição de Pagamento:*
➡️ Sinal (entrada): R$ ${sinal}
➡️ Restante na entrega: R$ ${restante}

━━━━━━━━━━━━━━━━━━━

🎁 *PROMOÇÃO*

💰 Base: R$200 = 1 cupom

🎟 Você recebeu *${cupons} cupons*

🔢 *Seus números:*
${numeros.join(", ")}

📊 *Você está participando com os números ${inicio} até ${fim}*

━━━━━━━━━━━━━━━━━━━

💳 *PIX:* ${empresa.pix}

📲 *Contato:* ${empresa.telefone}
`;

  document.getElementById("resultado").innerText = textoFinal;
}

// COPIAR
function copiar() {
  navigator.clipboard.writeText(textoFinal);
  alert("Copiado!");
}

// WHATS
function enviarWhats() {
  let telefone = document.getElementById("telefone").value;
  let msg = encodeURIComponent(textoFinal);
  window.open(`https://wa.me/55${telefone}?text=${msg}`, '_blank');
}

// PDF + WHATS
function gerarPDFWhats() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let img = new Image();
  img.src = "logo.png";

  img.onload = function() {

    doc.addImage(img, 'PNG', 55, 80, 100, 100);

    doc.setFont("Courier", "Normal");
    doc.setFontSize(10);

    let linhas = doc.splitTextToSize(textoFinal, 180);
    doc.text(linhas, 10, 20);

    let blob = doc.output("blob");
    let url = URL.createObjectURL(blob);
    window.open(url);

    let telefone = document.getElementById("telefone").value;
    let msg = encodeURIComponent("Segue seu orçamento em PDF 👍");

    window.open(`https://wa.me/55${telefone}?text=${msg}`, '_blank');
  }
}

// RESET CORRIGIDO
function resetar() {
  localStorage.removeItem("contadorCupons");
  alert("Cupons resetados!");
  location.reload();
}

</script>

</body>
</html>
